openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for North Texas Commercial Roofing website
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form submissions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact/quote request form
      description: Accepts a lead form submission from the website
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmission"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /contact/submissions:
    get:
      operationId: listContactSubmissions
      tags: [contact]
      summary: List all contact submissions
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactSubmission"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactInput:
      type: object
      required:
        - name
        - email
        - phone
        - serviceType
        - message
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        company:
          type: ["string", "null"]
        serviceType:
          type: string
          enum:
            - roof-repair
            - roof-replacement
            - inspection
            - maintenance
            - storm-damage
            - emergency-leak
            - coatings
            - flat-roofing
            - metal-roofing
            - tpo-epdm
            - other
        propertyType:
          type: ["string", "null"]
        message:
          type: string
          minLength: 1
        preferredContact:
          type: ["string", "null"]
          enum: ["phone", "email", null]
    ContactSubmission:
      type: object
      required:
        - id
        - name
        - email
        - phone
        - serviceType
        - message
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: ["string", "null"]
        serviceType:
          type: string
        propertyType:
          type: ["string", "null"]
        message:
          type: string
        preferredContact:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
