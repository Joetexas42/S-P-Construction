openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for North Texas Commercial Roofing website
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form submissions
  - name: estimator
    description: Instant satellite roof estimator
  - name: projects
    description: Portfolio project gallery
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact/quote request form
      description: Accepts a lead form submission from the website
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmission"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /contact/submissions:
    get:
      operationId: listContactSubmissions
      tags: [contact]
      summary: List all contact submissions
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactSubmission"
  /estimator/roof-area:
    get:
      operationId: getRoofArea
      tags: [estimator]
      summary: Look up roof area from Google Solar API
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
        - in: query
          name: lng
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Roof area lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoofAreaResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /estimator:
    post:
      operationId: submitEstimator
      tags: [estimator]
      summary: Submit instant satellite roof estimate lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimatorInput"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimatorSubmission"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /estimator/submissions:
    get:
      operationId: listEstimatorSubmissions
      tags: [estimator]
      summary: List all estimator submissions
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EstimatorSubmission"
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all portfolio projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new portfolio project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{id}:
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update an existing portfolio project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a portfolio project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Project deleted
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactInput:
      type: object
      required:
        - name
        - email
        - phone
        - serviceType
        - message
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        company:
          type: ["string", "null"]
        serviceType:
          type: string
          enum:
            - roof-repair
            - roof-replacement
            - inspection
            - maintenance
            - storm-damage
            - emergency-leak
            - coatings
            - flat-roofing
            - metal-roofing
            - tpo-epdm
            - other
        propertyType:
          type: ["string", "null"]
        message:
          type: string
          minLength: 1
        preferredContact:
          type: ["string", "null"]
          enum: ["phone", "email", null]
        city:
          type: ["string", "null"]
          description: City context pre-populated from a service×city landing page
        serviceContext:
          type: ["string", "null"]
          description: Human-readable service label pre-populated from a service×city landing page
    ContactSubmission:
      type: object
      required:
        - id
        - name
        - email
        - phone
        - serviceType
        - message
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: ["string", "null"]
        serviceType:
          type: string
        propertyType:
          type: ["string", "null"]
        message:
          type: string
        preferredContact:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        serviceContext:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
    EstimatorInput:
      type: object
      required:
        - name
        - email
        - phone
        - address
        - latitude
        - longitude
        - roofSqft
        - sqftSource
        - serviceType
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 1
        company:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        address:
          type: string
          minLength: 1
        latitude:
          type: number
        longitude:
          type: number
        roofSqft:
          type: integer
          minimum: 1
        sqftSource:
          type: string
          enum:
            - solar
            - manual
        serviceType:
          type: string
    EstimatorSubmission:
      type: object
      required:
        - id
        - name
        - email
        - phone
        - address
        - latitude
        - longitude
        - roofSqft
        - sqftSource
        - serviceType
        - estimatedCostUsd
        - pricePerSqft
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        roofSqft:
          type: integer
        sqftSource:
          type: string
        serviceType:
          type: string
        estimatedCostUsd:
          type: integer
        pricePerSqft:
          type: number
        createdAt:
          type: string
          format: date-time
    RoofAreaResult:
      type: object
      required:
        - found
        - roofSegments
      properties:
        found:
          type: boolean
        roofAreaSqMeters:
          type: ["number", "null"]
        roofAreaSqft:
          type: ["number", "null"]
        roofSegments:
          type: array
          description: >-
            Bounding boxes of each detected roof segment from the Solar API,
            used to draw a real (non-fabricated) outline on the satellite
            image. Empty if no segment geometry was returned.
          items:
            type: object
            required: [swLat, swLng, neLat, neLng]
            properties:
              swLat: { type: number }
              swLng: { type: number }
              neLat: { type: number }
              neLng: { type: number }
    Project:
      type: object
      required:
        - id
        - title
        - location
        - description
        - imageUrl
        - category
        - createdAt
      properties:
        id:
          type: integer
        title:
          type: string
        location:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        category:
          type: string
        createdAt:
          type: string
          format: date-time
    ProjectInput:
      type: object
      required:
        - title
        - location
        - description
        - imageUrl
        - category
      properties:
        title:
          type: string
          minLength: 1
        location:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        imageUrl:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
    ProjectUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        location:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        imageUrl:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
