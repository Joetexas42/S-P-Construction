name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        # Verifies every package compiles. SKIP_PRERENDER skips only the
        # Puppeteer prerender (needs Chromium + a running API), which is a
        # deploy-time step run by Cloudflare Pages, not a code-compile check.
        run: pnpm run build
        env:
          SKIP_PRERENDER: "1"
          # Placeholder values so the Vite configs (which require these at build
          # time) can resolve. They only affect the dev server / asset base path,
          # neither of which matters for a compile-only CI verification.
          PORT: "3000"
          BASE_PATH: "/"
